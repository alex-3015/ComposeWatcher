services:
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    ports:
      - '${COMPOSEWATCHER_PORT:-8555}:8080'
    environment:
      - DOCKER_DIR=/docker
      - DATA_DIR=/data
      - GITHUB_CONCURRENCY=5
      # - GITHUB_TOKEN=ghp_your_token_here   # optional: raises API limit from 60 to 5000 req/hour
      # - CORS_ORIGIN=https://compose.example.com   # optional: disabled by default
    volumes:
      - /path/to/your/docker/folder:/docker:ro # <-- Change this to your Compose directory
      - composewatcher_data:/data

volumes:
  composewatcher_data:
