services:
  app:
    image: ghcr.io/alex-3015/composewatcher:latest
    restart: unless-stopped
    ports:
      - "8555:8080"
    environment:
      - DOCKER_DIR=/docker
      - DATA_DIR=/data
      # - GITHUB_TOKEN=ghp_your_token_here   # optional: raises API limit from 60 to 5000 req/hour
    volumes:
      - /path/to/your/docker/folder:/docker:ro   # <-- Change this to your docker compose directory
      - composewatcher_data:/data

volumes:
  composewatcher_data:
